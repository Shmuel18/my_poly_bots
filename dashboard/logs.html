<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>logs · botview.live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1d29;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --primary: #1652f0;
    --primary-soft: #eaf0ff;
    --success: #0b8c3d;
    --success-soft: #dcfce7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --warning: #d97706;
    --warning-soft: #fef3c7;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  body.rtl { direction: rtl; }
  body.ltr { direction: ltr; }
  a { color: inherit; text-decoration: none; }

  .header {
    position: sticky; top: 0; z-index: 50;
    background: var(--card); border-bottom: 1px solid var(--border);
    height: 56px; display: flex; align-items: center;
    padding: 0 20px; gap: 24px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; }
  .logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
  .nav { display: flex; gap: 4px; flex: 1; }
  .nav a {
    padding: 6px 12px; border-radius: var(--radius-sm);
    font-weight: 500; color: var(--text-secondary);
  }
  .nav a:hover { background: var(--bg); color: var(--text); }
  .nav a.active { background: var(--primary-soft); color: var(--primary); }
  .lang-toggle {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    display: inline-flex; overflow: hidden;
  }
  .lang-toggle button {
    border: 0; background: transparent; color: var(--text-secondary);
    padding: 4px 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 12px;
  }
  .lang-toggle button.active { background: var(--text); color: #fff; }

  main { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }
  .page-title { font-size: 22px; font-weight: 700; margin: 0 0 16px; letter-spacing: -0.01em; }

  .controls {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 9999px;
    background: var(--card); border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--text-secondary); user-select: none;
  }
  .chip input { accent-color: var(--primary); margin: 0; }
  .chip.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .chip-danger.active { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
  .chip-warning.active { background: var(--warning-soft); border-color: var(--warning); color: var(--warning); }
  .chip-success.active { background: var(--success-soft); border-color: var(--success); color: var(--success); }

  .btn {
    padding: 6px 14px; border-radius: var(--radius-sm);
    background: var(--card); border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    color: var(--text); transition: background 0.12s;
  }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn.primary:hover { background: var(--primary); filter: brightness(1.05); }

  .stats-line {
    font-size: 12px; color: var(--text-muted); margin-left: auto;
  }

  .log-wrap {
    background: #0f172a;
    border-radius: var(--radius);
    padding: 18px 20px;
    max-height: calc(100vh - 220px);
    overflow-y: auto;
    box-shadow: var(--shadow);
    font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 12px; line-height: 1.55;
    direction: ltr; /* logs are LTR content */
    text-align: left;
  }
  .log-line { color: #cbd5e1; white-space: pre-wrap; word-break: break-word; padding: 1px 0; }
  .log-INFO { color: #cbd5e1; }
  .log-WARNING { color: #fbbf24; }
  .log-ERROR { color: #f87171; }
  .log-DEBUG { color: #94a3b8; opacity: 0.7; }
</style>
</head>
<body class="rtl">

<header class="header">
  <a class="logo" href="/"><span class="dot"></span><span>botview.live</span></a>
  <nav class="nav">
    <a href="/" data-i18n="nav.home">ראשי</a>
    <a href="/logs" class="active" data-i18n="nav.logs">לוגים</a>
    <a href="/env" data-i18n="nav.env">הגדרות</a>
  </nav>
  <div class="lang-toggle">
    <button type="button" data-lang="he">עב</button>
    <button type="button" data-lang="en">EN</button>
  </div>
</header>

<main>
  <h1 class="page-title" data-i18n="page.title">לוגים</h1>

  <div class="controls">
    <label class="chip active chip-info" id="chip-INFO">
      <input type="checkbox" checked /> INFO
    </label>
    <label class="chip active chip-warning" id="chip-WARNING">
      <input type="checkbox" checked /> WARNING
    </label>
    <label class="chip active chip-danger" id="chip-ERROR">
      <input type="checkbox" checked /> ERROR
    </label>
    <button class="btn" id="pause-btn" data-i18n="logs.pause">⏸ השהה</button>
    <button class="btn" id="clear-btn" data-i18n="logs.clear">נקה</button>
    <span class="stats-line" id="stats-line">—</span>
  </div>

  <div class="log-wrap" id="log-wrap"></div>
</main>

<script>
const I18N = {
  he: { "nav.home":"ראשי","nav.logs":"לוגים","nav.env":"הגדרות","page.title":"לוגים","logs.pause":"⏸ השהה","logs.resume":"▶ המשך","logs.clear":"נקה","logs.paused":"מושהה","logs.live":"חי","logs.count":"שורות" },
  en: { "nav.home":"Home","nav.logs":"Logs","nav.env":"Settings","page.title":"Logs","logs.pause":"⏸ Pause","logs.resume":"▶ Resume","logs.clear":"Clear","logs.paused":"paused","logs.live":"live","logs.count":"lines" },
};
let LANG = localStorage.getItem("dashLang") || "he";
function t(k) { return (I18N[LANG] && I18N[LANG][k]) || k; }
function applyLanguage() {
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === "he" ? "rtl" : "ltr";
  document.body.className = LANG === "he" ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === LANG));
  document.getElementById("pause-btn").textContent = paused ? t("logs.resume") : t("logs.pause");
}
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    LANG = btn.dataset.lang;
    localStorage.setItem("dashLang", LANG);
    applyLanguage();
  });
});

let paused = false;
const pauseBtn = document.getElementById("pause-btn");
const clearBtn = document.getElementById("clear-btn");
pauseBtn.addEventListener("click", () => { paused = !paused; pauseBtn.textContent = paused ? t("logs.resume") : t("logs.pause"); });
clearBtn.addEventListener("click", () => { document.getElementById("log-wrap").innerHTML = ""; });

const filters = { INFO: true, WARNING: true, ERROR: true };
["INFO","WARNING","ERROR"].forEach(level => {
  const chip = document.getElementById("chip-" + level);
  chip.addEventListener("click", (e) => {
    filters[level] = !filters[level];
    chip.classList.toggle("active", filters[level]);
    chip.querySelector("input").checked = filters[level];
    rerender(lastLines);
  });
});

let lastLines = [];
function classify(line) {
  if (/\bERROR\b/.test(line)) return "ERROR";
  if (/\bWARNING\b/.test(line)) return "WARNING";
  if (/\bDEBUG\b/.test(line)) return "DEBUG";
  return "INFO";
}
function rerender(lines) {
  const host = document.getElementById("log-wrap");
  const atBottom = host.scrollHeight - host.scrollTop - host.clientHeight < 40;
  const html = lines.map(l => {
    const lvl = classify(l);
    if (lvl !== "DEBUG" && !filters[lvl]) return "";
    return `<div class="log-line log-${lvl}">${l.replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]))}</div>`;
  }).join("");
  host.innerHTML = html;
  if (atBottom) host.scrollTop = host.scrollHeight;
  const counts = { INFO: 0, WARNING: 0, ERROR: 0 };
  lines.forEach(l => counts[classify(l)] && counts[classify(l)]++);
  document.getElementById("stats-line").textContent =
    `${lines.length} ${t("logs.count")} · INFO ${lines.filter(l => classify(l)==="INFO").length} · WARN ${lines.filter(l => classify(l)==="WARNING").length} · ERR ${lines.filter(l => classify(l)==="ERROR").length}`;
}

async function refresh() {
  if (paused) return;
  try {
    const r = await fetch("/api/logs?n=300");
    const j = await r.json();
    lastLines = j.lines || [];
    rerender(lastLines);
  } catch (e) { /* keep last */ }
}

applyLanguage();
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
