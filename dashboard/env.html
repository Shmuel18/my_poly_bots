<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>settings · botview.live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1d29;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --primary: #1652f0;
    --primary-soft: #eaf0ff;
    --success: #0b8c3d;
    --success-soft: #dcfce7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --warning: #d97706;
    --warning-soft: #fef3c7;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  body.rtl { direction: rtl; }
  body.ltr { direction: ltr; }
  a { color: inherit; text-decoration: none; }
  .num { font-variant-numeric: tabular-nums; }

  .header {
    position: sticky; top: 0; z-index: 50;
    background: var(--card); border-bottom: 1px solid var(--border);
    height: 56px; display: flex; align-items: center;
    padding: 0 20px; gap: 24px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; }
  .logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
  .nav { display: flex; gap: 4px; flex: 1; }
  .nav a {
    padding: 6px 12px; border-radius: var(--radius-sm);
    font-weight: 500; color: var(--text-secondary);
  }
  .nav a:hover { background: var(--bg); color: var(--text); }
  .nav a.active { background: var(--primary-soft); color: var(--primary); }
  .lang-toggle {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    display: inline-flex; overflow: hidden;
  }
  .lang-toggle button {
    border: 0; background: transparent; color: var(--text-secondary);
    padding: 4px 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 12px;
  }
  .lang-toggle button.active { background: var(--text); color: #fff; }

  main { max-width: 980px; margin: 0 auto; padding: 24px 20px 48px; }
  .page-title { font-size: 22px; font-weight: 700; margin: 0 0 16px; letter-spacing: -0.01em; }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .section h2 { font-size: 15px; font-weight: 700; margin: 0 0 12px; }
  .kv {
    display: grid; grid-template-columns: 200px 1fr;
    gap: 8px 20px; font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .kv:last-child { border-bottom: 0; }
  .kv .k { color: var(--text-secondary); font-weight: 500; }
  .kv .v { color: var(--text); font-weight: 600; }
  .kv .v.num { font-variant-numeric: tabular-nums; }

  .env-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .env-item {
    padding: 12px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: #fafafa;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px;
  }
  .env-name { font-weight: 600; font-family: 'JetBrains Mono', Menlo, monospace; font-size: 12px; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 9999px;
    font-size: 11px; font-weight: 600;
  }
  .pill-success { background: var(--success-soft); color: var(--success); }
  .pill-danger { background: var(--danger-soft); color: var(--danger); }
  .pill-gray { background: #f3f4f6; color: #4b5563; }
</style>
</head>
<body class="rtl">

<header class="header">
  <a class="logo" href="/"><span class="dot"></span><span>botview.live</span></a>
  <nav class="nav">
    <a href="/" data-i18n="nav.home">ראשי</a>
    <a href="/logs" data-i18n="nav.logs">לוגים</a>
    <a href="/env" class="active" data-i18n="nav.env">הגדרות</a>
  </nav>
  <div class="lang-toggle">
    <button type="button" data-lang="he">עב</button>
    <button type="button" data-lang="en">EN</button>
  </div>
</header>

<main>
  <h1 class="page-title" data-i18n="page.title">הגדרות ומערכת</h1>

  <div class="section">
    <h2 data-i18n="env.service">שירות הבוט</h2>
    <div class="kv"><span class="k" data-i18n="env.service.status">סטטוס</span><span class="v" id="svc-status">—</span></div>
    <div class="kv"><span class="k" data-i18n="env.service.uptime">Uptime</span><span class="v num" id="svc-uptime">—</span></div>
    <div class="kv"><span class="k" data-i18n="env.service.memory">זיכרון</span><span class="v num" id="svc-memory">—</span></div>
    <div class="kv"><span class="k" data-i18n="env.service.pid">PID</span><span class="v num" id="svc-pid">—</span></div>
    <div class="kv"><span class="k" data-i18n="env.service.log">קובץ לוג</span><span class="v" id="svc-log" style="font-family: 'JetBrains Mono', monospace; font-size: 11px; word-break: break-all;">—</span></div>
  </div>

  <div class="section">
    <h2 data-i18n="env.wallet">ארנק ומחירים</h2>
    <div class="kv"><span class="k" data-i18n="env.balance">יתרה</span><span class="v num" id="env-balance">—</span></div>
  </div>

  <div class="section">
    <h2 data-i18n="env.keys">מפתחות ו-API credentials</h2>
    <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 14px;" data-i18n="env.keys.hint">לא מציג ערכים — רק איזה מפתח מוגדר</p>
    <div class="env-grid" id="env-grid"></div>
  </div>
</main>

<script>
const I18N = {
  he: {
    "nav.home":"ראשי","nav.logs":"לוגים","nav.env":"הגדרות",
    "page.title":"הגדרות ומערכת",
    "env.service":"שירות הבוט","env.service.status":"סטטוס","env.service.uptime":"Uptime","env.service.memory":"זיכרון","env.service.pid":"PID","env.service.log":"קובץ לוג",
    "env.wallet":"ארנק ומחירים","env.balance":"יתרה",
    "env.keys":"מפתחות ו-API credentials","env.keys.hint":"לא מציג ערכים — רק איזה מפתח מוגדר",
    "status.running":"פועל","status.failed":"כשל","status.unknown":"לא ידוע",
    "env.set":"מוגדר","env.missing":"חסר",
  },
  en: {
    "nav.home":"Home","nav.logs":"Logs","nav.env":"Settings",
    "page.title":"System & Settings",
    "env.service":"Bot Service","env.service.status":"Status","env.service.uptime":"Uptime","env.service.memory":"Memory","env.service.pid":"PID","env.service.log":"Log file",
    "env.wallet":"Wallet & Prices","env.balance":"Balance",
    "env.keys":"Keys & API credentials","env.keys.hint":"Values are not shown — only whether each is configured",
    "status.running":"Running","status.failed":"Failed","status.unknown":"Unknown",
    "env.set":"set","env.missing":"missing",
  },
};
let LANG = localStorage.getItem("dashLang") || "he";
function t(k) { return (I18N[LANG] && I18N[LANG][k]) || k; }
function applyLanguage() {
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === "he" ? "rtl" : "ltr";
  document.body.className = LANG === "he" ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll(".lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === LANG));
  if (lastStatus) render(lastStatus);
}
document.querySelectorAll(".lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    LANG = btn.dataset.lang;
    localStorage.setItem("dashLang", LANG);
    applyLanguage();
  });
});

const fmtUptime = s => {
  if (!s) return "—";
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
};

let lastStatus = null;
async function refresh() {
  try {
    const r = await fetch("/api/status");
    const d = await r.json();
    lastStatus = d;
    render(d);
  } catch (e) {
    console.error(e);
  }
}
function render(d) {
  const svc = d.service || {};
  const statusEl = document.getElementById("svc-status");
  const label =
    svc.active === "active" ? t("status.running") :
    svc.active === "failed" ? t("status.failed") : t("status.unknown");
  const cls = svc.active === "active" ? "pill-success" : svc.active === "failed" ? "pill-danger" : "pill-gray";
  statusEl.innerHTML = `<span class="pill ${cls}">${label}</span>`;

  document.getElementById("svc-uptime").textContent = fmtUptime(svc.uptime_sec);
  document.getElementById("svc-memory").textContent = svc.memory_mb ? `${svc.memory_mb} MB` : "—";
  document.getElementById("svc-pid").textContent = svc.main_pid || "—";
  document.getElementById("svc-log").textContent = d.log_file || "—";

  document.getElementById("env-balance").textContent = d.latest_balance_usd == null ? "—" : `$${d.latest_balance_usd.toFixed(2)}`;

  const env = d.env || {};
  const host = document.getElementById("env-grid");
  host.innerHTML = Object.entries(env).map(([k, v]) => `
    <div class="env-item">
      <span class="env-name">${k}</span>
      <span class="pill ${v ? "pill-success" : "pill-danger"}">${v ? "✓ " + t("env.set") : "✗ " + t("env.missing")}</span>
    </div>
  `).join("");
}
applyLanguage();
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
