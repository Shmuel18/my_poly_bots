# Global Settings for Polymarket Bots

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  file: "logs/bot.log"
  max_file_size: 5242880  # 5MB
  backup_count: 3

# API Configuration
api:
  timeout: 30
  max_retries: 3
  retry_delay: 2
  rate_limit_delay: 1

# WebSocket Configuration
websocket:
  ping_interval: 20
  ping_timeout: 20
  reconnect_delay: 5
  max_reconnect_attempts: 10

# Trading Defaults
trading:
  max_position_size: 100.0
  min_position_size: 1.0
  default_slippage: 0.01
  order_timeout: 30

# Market Scanning
scanning:
  scan_interval: 300  # 5 minutes
  price_check_interval: 30  # 30 seconds
  max_markets_to_scan: 5000

# Calendar Arbitrage Strategy
# Defaults — CLI flags on run_calendar_bot.py override these.
calendar_arbitrage:
  min_profit_threshold: 0.01            # 1% minimum locked-in profit after fees
  min_annualized_roi: 0.15              # 15% annualized ROI threshold (avoid long capital lockup)
  estimated_fee: 0.01                   # per-leg fee/slippage buffer
  min_resolution_match_confidence: 0.9  # LLM confidence that both markets resolve identically
  similarity_threshold: 0.85            # cosine similarity cutoff for embedding match
  # Early exit: sell both legs once the spread has closed enough that selling now
  # nets ≥ this many USD above entry cost. Captures profit early and rotates capital
  # faster — often worth more than waiting for resolution in months.
  early_exit_threshold: 0.20            # in USD per share-pair (0.20 = 20¢)
  # Human-in-the-loop tiered sizing (for $100 capital). Probe every new pair
  # small; escalate to Telegram after a persistent spread; scale up once user
  # approves in Telegram.
  probe_usd: 5.0                        # probe size on newly-discovered pairs
  confirmed_usd: 20.0                   # full size once user confirms via Telegram
  escalation_minutes: 30                # hold probe this long before alerting
